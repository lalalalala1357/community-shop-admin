<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>商品管理｜社區團購站</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="products">
  <div class="app-shell">
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="admin.html">小舖店務</a>
        <nav class="nav">
          <a href="admin.html">儀表板</a>
          <a class="active" href="admin-products.html">商品管理</a>
          <a href="admin-orders.html">訂單管理</a>
          <a href="admin-pickup.html">取貨管理</a>
          <a href="admin-announcements.html">公告管理</a>
          <a href="admin-wishes.html">許願管理</a>
          <button class="logoutBtn">登出</button>
        </nav>
      </div>
    </header>
    <main class="container admin-layout">
      <div class="section-head">
        <h1>商品管理</h1>
        <button class="btn inline" id="newProductBtn">新增商品</button>
      </div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>商品</th><th>價格</th><th>銷售</th><th>狀態</th><th>操作</th></tr></thead>
          <tbody id="productsTable"></tbody>
        </table>
      </div>
    </main>
    <div class="modal" id="productModal">
      <div class="card modal-panel">
        <div id="productModalPanel"></div>
      </div>
    </div>
    <nav class="bottom-nav">
      <a href="admin.html">儀表板</a>
      <a class="active" href="admin-products.html">商品</a>
      <a href="admin-orders.html">訂單</a>
      <a href="admin-pickup.html">取貨</a>
    </nav>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
