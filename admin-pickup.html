<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>取貨管理｜社區團購站</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body data-page="pickup">
  <div class="app-shell">
    <header class="topbar">
      <div class="container topbar-inner">
        <a class="brand" href="admin.html">小舖店務</a>
        <nav class="nav">
          <a href="admin.html">儀表板</a>
          <a href="admin-products.html">商品管理</a>
          <a href="admin-orders.html">訂單管理</a>
          <a class="active" href="admin-pickup.html">取貨管理</a>
          <a href="admin-announcements.html">公告管理</a>
          <a href="admin-wishes.html">許願管理</a>
          <button class="logoutBtn">登出</button>
        </nav>
      </div>
    </header>
    <main class="container admin-layout">
      <h1>取貨管理</h1>
      <form class="form card card-body" id="pickupForm">
        <div class="field">
          <label>電話或訂單編號</label>
          <input name="keyword" placeholder="輸入電話或 O202606200001" required>
        </div>
        <button class="btn">快速搜尋</button>
      </form>
      <section class="grid" id="pickupResults" style="margin-top:16px"></section>
      <section class="card card-body">
        <div class="section-head">
          <h2>可取貨清單</h2>
          <p id="readyPickupCount">0 筆</p>
        </div>
        <div class="grid" id="readyPickupList"></div>
      </section>
    </main>
    <nav class="bottom-nav">
      <a href="admin.html">儀表板</a>
      <a href="admin-products.html">商品</a>
      <a href="admin-orders.html">訂單</a>
      <a class="active" href="admin-pickup.html">取貨</a>
    </nav>
  </div>
  <script type="module" src="js/app.js"></script>
</body>
</html>
